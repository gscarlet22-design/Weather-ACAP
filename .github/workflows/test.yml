name: Build Check

# Fast feedback on every push/PR — verify the native code compiles.
on:
  push:
  pull_request:

jobs:
  build-check:
    name: Compile check (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7hf]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cross-compile with ACAP Native SDK
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/app:/opt/app" \
            axisecp/acap-native-sdk:1.14-${{ matrix.arch }}-ubuntu22.04 \
            sh -c '. /opt/axis/acapsdk/environment-setup-* \
                   && cd /opt/app \
                   && make clean \
                   && make -j$(nproc) \
                   && echo "Build OK: weather_acap + config_cgi" \
                   && file weather_acap html/config_cgi'
